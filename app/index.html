<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIFY - Streaming de Música</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #121212; color: #fff; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #1e1e1e; padding: 20px; border-radius: 8px; }
        h1 { color: #1db954; text-align: center; }
        input, button { width: 100%; padding: 10px; margin-top: 10px; box-sizing: border-box; border-radius: 4px; border: none; }
        input { background: #333; color: white; }
        button { background: #1db954; color: white; font-weight: bold; cursor: pointer; }
        button:hover { background: #1ed760; }
        ul { list-style: none; padding: 0; }
        li { background: #333; margin-top: 10px; padding: 10px; border-radius: 4px; display: flex; flex-direction: column; }
        .artist { font-size: 0.8em; color: #aaa; }
    </style>
</head>
<body>
    <div class="container">
        <h1>UNIFY 🎵</h1>
        <p style="text-align:center;">Adicione músicas à sua plataforma</p>
        
        <form id="musicForm">
            <input type="text" id="title" placeholder="Nome da Música" required>
            <input type="text" id="artist" placeholder="Artista" required>
            <input type="text" id="genre" placeholder="Gênero (ex: Rock, Pop)" required>
            <button type="submit">Cadastrar Música</button>
        </form>

        <h2 style="margin-top: 30px;">Catálogo</h2>
        <ul id="musicList"></ul>
    </div>

    <script>
        const API_URL = '/api/musics';

        // Função para carregar as músicas
        async function loadMusics() {
            const res = await fetch(API_URL);
            const musics = await res.json();
            const list = document.getElementById('musicList');
            list.innerHTML = '';
            musics.forEach(m => {
                list.innerHTML += `<li>
                    <strong>${m.title}</strong>
                    <span class="artist">${m.artist} - ${m.genre}</span>
                </li>`;
            });
        }

        // Função para cadastrar
        document.getElementById('musicForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = document.getElementById('title').value;
            const artist = document.getElementById('artist').value;
            const genre = document.getElementById('genre').value;

            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, artist, genre })
            });

            document.getElementById('musicForm').reset();
            loadMusics(); // Recarrega a lista
        });

        // Carregar músicas ao iniciar
        loadMusics();
    </script>
</body>
</html>
