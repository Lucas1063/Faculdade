version: '3.8'

services:
  app:
    build: .
    container_name: unify_app
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - PORT=3000
    networks:
      - unify_network
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: unify_db
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME}
    ports:
      - "3306:3306"
    volumes:
      - unify_data:/var/lib/mysql
    networks:
      - unify_network

networks:
  unify_network:
    driver: bridge

volumes:
  unify_data: